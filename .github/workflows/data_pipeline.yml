name: R6 Data Agent Automation Pipeline

on:
  # Allows manual triggering from the GitHub Actions tab for your live demo
  workflow_dispatch:
  
  # Automates the execution on a schedule (Every Friday at 21:00 UTC / 5 PM EST after market close)
  schedule:
    - cron: '0 21 * * 5'

jobs:
  run-r6-automation:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the team's repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up a stable Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # Step 3: Install required data engineering packages
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas

    # Step 4: Execute the R6 automation script to fetch actuals
    - name: Run R6 Data Collection Script
      run: python r6_macro_automation.py

    # Step 5: Secure commit and push with safety checks and skip-ci tokens
    - name: Commit and Push Verified Actuals Document
      run: >
        git config --global user.name "github-actions[bot]" &&
        git config --global user.email "github-actions[bot]@users.noreply.github.com" &&
        git add actual_2026-W23.md &&
        (git diff-index --quiet HEAD || git commit -m "auto(r6): update weekly market actuals [skip ci]") &&
        git push
