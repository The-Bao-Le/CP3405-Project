name: R3 Almanac Agent Multi-Week Automation Pipeline

on:
  # push:
  #   branches:
  #     - Week-07
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      custom_market_week:
        description: 'Target MARKET week to override manually (Leave BLANK for automated next week forecast)'
        required: false
        type: string
      custom_market_date:
        description: 'Target DATE RANGE to override manually (Leave BLANK for automated next week forecast)'
        required: false
        type: string

jobs:
  execute-r3-matrix:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Active Repository Branch
      uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}
        persist-credentials: true

    - name: Initialize Python Core Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Deploy Script Dependencies
      working-directory: ./r3_almanac_agent
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Parameterized R3 Almanac Agent
      working-directory: ./r3_almanac_agent
      run: |
        # Pass manual override tokens dynamically if they exist.
        # If blank, Python internally computes the precise T+1 upcoming trading week!
        python r3_almanac_agent.py "${{ github.event.inputs.custom_market_week }}" "${{ github.event.inputs.custom_market_date }}"

    - name: Secure Ledger Artifacts & Route Commit to Active Branch
      run: |
        git config --global user.name "Team2 Data Automation Bot"
        git config --global user.email "bot@team2.financial"
        
        # Capture all newly generated artifacts dynamically in the outputs folder
        git add r3_almanac_agent/outputs/*
        
        if git diff --staged --quiet; then
          echo "No strategic data shifts detected. Terminating smoothly."
        else
          git commit -m "chore(data): automated R3 next-week forecast execution matrix [skip ci]"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ github.ref_name }}
        fi
