name: R10 Calibration Automation

on:
  workflow_dispatch:
    inputs:
      week:
        description: "Week to calibrate, e.g. W24, W25, W27"
        required: true
        default: "W25"
        type: string

      target_branch:
        description: "Branch to run against and commit to. Leave blank to use current branch."
        required: false
        default: ""
        type: string

  workflow_run:
    workflows:
      - "Automated Cross-Asset Market Audit Pipeline"
    types:
      - completed

permissions:
  contents: write

jobs:
  calibrate:
    name: Generate calibration log
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve calibration week
        id: resolve_week
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.week }}" ]; then
            WEEK="${{ github.event.inputs.week }}"
            WEEK=$(echo "$WEEK" | tr '[:lower:]' '[:upper:]')

            if [[ "$WEEK" != W* ]]; then
              WEEK="W$WEEK"
            fi

            echo "Manual calibration week selected: $WEEK"
            echo "week=$WEEK" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Auto-detecting latest actual week with a matching prediction file..."

          SELECTED_WEEK=""

          for ACTUAL_FILE in $(ls actual_2026-W*.md 2>/dev/null | sort -V -r); do
            WEEK=$(echo "$ACTUAL_FILE" | sed -E 's/actual_2026-(W[0-9]+)\.md/\1/')
            PREDICTION_FILE="prediction_2026-${WEEK}_team2.md"
            RESULT_FILE="docs/r10/calibration_result_${WEEK}.json"

            echo "Checking $WEEK..."

            if [ ! -f "$PREDICTION_FILE" ]; then
              echo "Skipping $WEEK: no matching prediction file."
              continue
            fi

            if [ -f "$RESULT_FILE" ]; then
              echo "Skipping $WEEK: calibration result already exists."
              continue
            fi

            SELECTED_WEEK="$WEEK"
            break
          done

          if [ -z "$SELECTED_WEEK" ]; then
            echo "No pending calibration found."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected calibration week: $SELECTED_WEEK"
          echo "week=$SELECTED_WEEK" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Validate required files
        if: steps.resolve_week.outputs.should_run == 'true'
        shell: bash
        run: |
          WEEK="${{ steps.resolve_week.outputs.week }}"

          PREDICTION_FILE="prediction_2026-${WEEK}_team2.md"
          ACTUAL_FILE="actual_2026-${WEEK}.md"

          if [ ! -f "$PREDICTION_FILE" ]; then
            echo "Missing prediction file: $PREDICTION_FILE"
            exit 1
          fi

          if [ ! -f "$ACTUAL_FILE" ]; then
            echo "Missing actual file: $ACTUAL_FILE"
            exit 1
          fi

      - name: Run R10 calibration automation
        if: steps.resolve_week.outputs.should_run == 'true'
        shell: bash
        run: |
          WEEK="${{ steps.resolve_week.outputs.week }}"
          python src/r10_calibration_automation.py --week "$WEEK"

      - name: Commit calibration outputs
        if: steps.resolve_week.outputs.should_run == 'true'
        shell: bash
        run: |
          WEEK="${{ steps.resolve_week.outputs.week }}"

          git config --global user.name "Team2 Calibration Bot"
          git config --global user.email "bot@team2.financial"

          git add docs/r10/calibration_log_${WEEK}.md docs/r10/calibration_result_${WEEK}.json

          if git diff --staged --quiet; then
            echo "No calibration changes detected."
          else
            git commit -m "chore(r10): automate calibration for ${WEEK}"
            git push
          fi
