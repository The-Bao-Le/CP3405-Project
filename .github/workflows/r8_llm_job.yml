name: Automated R8 LLM Operator

on:
  push:
    branches:
      - Week-06
  # Configured for execution every Saturday morning at 09:45 Singapore/Beijing Time (01:45 UTC)
  schedule:
    - cron: '45 1 * * 6'
  workflow_dispatch:

jobs:
  multi_model_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grants commit push capabilities back into the repository

    steps:
      - name: Checkout Active Repository Branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Python Core Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Deploy Script Dependencies
        run: |
          pip install openai requests argparse

      - name: Resolve Target Market Week Variable
        run: |
          WEEK_NUM=$(date +%V)
          echo "MARKET_WEEK=W${WEEK_NUM}" >> $GITHUB_ENV
          echo "Target Execution Window resolved: W${WEEK_NUM}"

      - name: Query All 4 LLMs via GitHub Free Models Cloud Layer
        env:
          # Injects the built-in repository token automatically without creating manual secrets
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python r8_llm_operator.py --market-week ${{ env.MARKET_WEEK }}

      - name: Secure Consensus Ledger & Route Commit to Active Branch
        run: |
          git config --global user.name "Team2 R8 LLM Operator"
          git config --global user.email "r8-operator@team2.financial"
          
          # Stage the newly created JSON response archive and Markdown matrix board
          git add r8_raw_responses_*.json r8_comparison_matrix_*.md
          
          if git diff --staged --quiet; then
            echo "No strategy drift detected. Operational termination smooth."
          else
            git commit -m "docs(r8): multi-model comparison ledger updated via cloud free-tier [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
