name: Automated R8 LLM Operator

on:
  schedule:
    # Configured for execution every Saturday at 16:00 Singapore time
    - cron: '0 8 * * 6'
  workflow_dispatch: # Allows manual triggering

jobs:
  multi_model_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Active Repository Branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Required SDK Dependencies
        run: |
          pip install openai requests argparse

      - name: Resolve Dynamic Target Week
        run: |
          WEEK_NUM=$(date +%V)
          echo "MARKET_WEEK=W${WEEK_NUM}" >> $GITHUB_ENV

      # =====================================================================
      # 🔑 Injecting the OPENROUTER_API_KEY environment variable as instructed
      # =====================================================================
      - name: Run R8 Multi-Model Operator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python r8_llm_operator.py --market-week ${{ env.MARKET_WEEK }}

      - name: Commit and Push Matrix and Raw Ledger to Repo
        run: |
          git config --global user.name "Team2 R8 LLM Operator"
          git config --global user.email "r8-operator@team2.financial"
          git add r8_raw_responses_*.json r8_comparison_matrix_*.md
          git commit -m "docs(r8): updated free open-source multi-model matrix [skip ci]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
