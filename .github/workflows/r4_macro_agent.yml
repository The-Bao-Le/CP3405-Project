name: Generate R4 Macro Report

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests
      - run: python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: r4-macro-agent-outputs
          path: outputs/
