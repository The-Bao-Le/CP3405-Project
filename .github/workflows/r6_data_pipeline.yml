name: R6 Data Agent Automation Pipeline

on:
  workflow_dispatch:
    inputs:
      custom_market_week:
        description: "Target MARKET week, e.g. W24"
        required: false
        type: string

  schedule:
    - cron: "0 22 * * 5"

jobs:
  audit_and_log:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install yfinance

      - name: Resolve week variables
        run: |
          if [ -n "${{ github.event.inputs.custom_market_week }}" ]; then
            M_WEEK=$(echo "${{ github.event.inputs.custom_market_week }}" | tr '[:lower:]' '[:upper:]')
          else
            WEEK_NUM=$(date +%V)
            M_WEEK="W${WEEK_NUM}"
          fi

          WEEK_NUM=$(echo "$M_WEEK" | tr -cd '0-9')
          PREV_NUM=$((10#$WEEK_NUM - 1))
          A_WEEK="W${PREV_NUM}"

          echo "MARKET_WEEK=$M_WEEK" >> $GITHUB_ENV
          echo "ACTUAL_WEEK=$A_WEEK" >> $GITHUB_ENV

          echo "MARKET_WEEK=$M_WEEK"
          echo "ACTUAL_WEEK=$A_WEEK"

      - name: Run R6 data pipeline
        run: |
          python r6_macro_automation.py --market-week ${{ env.MARKET_WEEK }} --actual-week ${{ env.ACTUAL_WEEK }}

      - name: Commit generated files
        run: |
          git config --global user.name "R6 Data Agent Bot"
          git config --global user.email "r6-data-agent-bot@example.com"

          git add "market_snapshot_${MARKET_WEEK}.json" "actual_2026-${ACTUAL_WEEK}.md"

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update R6 market actuals"
            git push
          fi
