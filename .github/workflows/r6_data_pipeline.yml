name: Automated Cross-Asset Market Audit Pipeline

on:
  # 🌟 DYNAMIC MANUAL TRIGGER: Allows testing historical weeks without changing code
  workflow_dispatch:
    inputs:
      custom_week:
        description: 'Target Week to override (Leave BLANK for dynamic current week execution, e.g., W23)'
        required: false
        type: string

  # 🌟 AUTOMATED SCHEDULE: Runs blindly and automatically every Friday post-market
  schedule:
    - cron: '0 22 * * 5'

jobs:
  audit_and_log:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Bypasses the 403 write-access permission block
      
    steps:
      - name: Checkout Active Repository Branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - name: Initialize Python Core Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Deploy Script Dependencies
        run: |
          pip install yfinance argparse

      - name: Resolve Execution Week Dynamic Variable
        # This shell step automatically resolves the target week dynamically
        # Priority: Manual input -> Environment ISO week fallback
        id: resolve_week
        run: |
          if [ -n "${{ github.event.inputs.custom_week }}" ]; then
            RESOLVED_WEEK=$(echo "${{ github.event.inputs.custom_week }}" | tr '[:lower:]' '[:upper:]')
            echo "Execution Mode: Manual Override Detected."
          else
            # Automatically grabs current year's week number (e.g., 23 -> W23)
            CURRENT_WEEK_NUM=$(date +%V)
            RESOLVED_WEEK="W${CURRENT_WEEK_NUM}"
            echo "Execution Mode: Fully Automated Calendar Resolution."
          fi
          echo "FINAL_WEEK=$RESOLVED_WEEK" >> $GITHUB_ENV
          echo "Resolved target parameter for this session: $RESOLVED_WEEK"

      - name: Run Dynamic Matrix Market Audit
        # Executes your script with zero hardcoded references
        run: |
          python r6_macro_automation.py --week ${{ env.FINAL_WEEK }}

      - name: Secure Ledger Artifacts & Route Commit to Active Branch
        run: |
          git config --global user.name "Team2 Data Automation Bot"
          git config --global user.email "bot@team2.financial"
          
          # Dynamic file tracking based on resolved timeline variable
          git add market_snapshot_${{ env.FINAL_WEEK }}.json actual_2026-${{ env.FINAL_WEEK }}.md
          
          if git diff --staged --quiet; then
            echo "No data changes detected for ${{ env.FINAL_WEEK }}. Terminating pipeline workflow safely."
          else
            git commit -m "chore(data): automated ${{ env.FINAL_WEEK }} market ledger alignment [skip ci]"
            echo "Routing validated payload back to upstream context: ${{ github.ref_name }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
