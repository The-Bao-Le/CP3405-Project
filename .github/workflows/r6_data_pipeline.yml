name: Automated Cross-Asset Market Audit Pipeline

on:
  push:
    branches:
      - 'Week-**'  # Active sprint operational branch
      - 'main'
  schedule:
    - cron: '0 22 * * 5'

env:
  # 🌟 GLOBAL VARIABLE CENTRALIZATION: Change this single line for future weeks (e.g., W24, W25)
  TARGET_WEEK: 'W23'

jobs:
  audit_and_log:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Bypasses the 403 authorization lock safely
      
    steps:
      - name: Checkout Active Repository Branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - name: Initialize Python Core Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Deploy Script Dependencies
        run: |
          pip install yfinance argparse

      - name: Run Dynamic Matrix Market Audit
        # 🌟 PASSING VARIABLE: Dynamically injects the global environment variable into the execution runtime
        run: |
          python r6_macro_automation.py --week ${{ env.TARGET_WEEK }}

      - name: Secure Ledger Artifacts & Route Commit to Active Branch
        run: |
          git config --global user.name "Team2 Data Automation Bot"
          git config --global user.email "bot@team2.financial"
          
          # 🌟 DYNAMIC TRACKING: Stages files dynamically based on the global env variable
          git add market_snapshot_${{ env.TARGET_WEEK }}.json actual_2026-${{ env.TARGET_WEEK }}.md
          
          if git diff --staged --quiet; then
            echo "No data changes detected for ${{ env.TARGET_WEEK }}. Terminating pipeline workflow safely."
          else
            # 🌟 DYNAMIC COMMIT MESSAGE: Injects variable context safely into the repo ledger
            git commit -m "chore(data): automated ${{ env.TARGET_WEEK }} market ledger alignment [skip ci]"
            echo "Routing validated payload back to upstream context: ${{ github.ref_name }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
