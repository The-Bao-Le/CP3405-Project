name: R6 Data Agent Automation Pipeline

on:
  # Allows immediate manual triggering on the Week-04 branch layout
  workflow_dispatch:
  
  # Tracking loop parameters triggered on pushes to Week-04 environment
  push:
    branches:
      - Week-04

jobs:
  run-r6-automation:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the team's repository code from current tracking target
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: Week-04

    # Step 2: Set up a stable Python environment (Cleaned without problematic cache anchors)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install required data engineering packages
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas

    # Step 4: Execute the R6 automation script to fetch actuals
    - name: Run R6 Data Collection Script
      run: python r6_macro_automation.py

    # Step 5: Secure commit and push targeting the active branch directly
    - name: Commit and Push Verified Actuals Document
      run: >
        git config --global user.name "github-actions[bot]" &&
        git config --global user.email "github-actions[bot]@users.noreply.github.com" &&
        git add actual_2026-W23.md &&
        (git diff-index --quiet HEAD || git commit -m "auto(r6): update market actuals for Week-04 branch [skip ci]") &&
        git push origin Week-04
